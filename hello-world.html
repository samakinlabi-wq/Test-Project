<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello, World!</title>
<style>
  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent: #ff6ec4;
    --accent-2: #7873f5;
    --accent-3: #4ade80;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-2));
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    overflow: hidden;
    position: relative;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    bottom: -50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.6);
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) translateX(0) scale(1);
      opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 0.8; }
    100% {
      transform: translateY(-110vh) translateX(var(--drift, 40px)) scale(0.3);
      opacity: 0;
    }
  }

  .card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 4rem 5rem;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.4),
      inset 0 1px 1px rgba(255, 255, 255, 0.15);
    animation: floatCard 6s ease-in-out infinite;
  }

  @keyframes floatCard {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  h1 {
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 6s linear infinite;
    text-shadow: 0 0 60px rgba(255, 110, 196, 0.35);
  }

  @keyframes shine {
    to { background-position: 300% center; }
  }

  .subtitle {
    margin-top: 1rem;
    font-size: 1.15rem;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .divider {
    width: 80px;
    height: 3px;
    margin: 1.75rem auto;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 12px var(--accent);
  }

  .wave {
    display: inline-block;
    animation: wave 2.2s ease-in-out infinite;
    transform-origin: 70% 70%;
  }

  @keyframes wave {
    0%, 60%, 100% { transform: rotate(0deg); }
    10% { transform: rotate(14deg); }
    20% { transform: rotate(-8deg); }
    30% { transform: rotate(14deg); }
    40% { transform: rotate(-4deg); }
    50% { transform: rotate(10deg); }
  }

  footer {
    margin-top: 2rem;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="card">
    <h1><span class="wave">👋</span> Hello, World!</h1>
    <div class="divider"></div>
    <p class="subtitle">Welcome to something beautiful</p>
    <footer>crafted with HTML &amp; CSS</footer>
  </div>

  <script>
    const container = document.getElementById('particles');
    const count = 30;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.setProperty('--drift', (Math.random() * 160 - 80) + 'px');
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>

</body>
</html>
