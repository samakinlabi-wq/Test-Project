<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<style>
  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent: #ff6ec4;
    --accent-2: #7873f5;
    --accent-3: #4ade80;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-2));
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    overflow: hidden;
    position: relative;
    padding: 6rem 1.5rem 2rem;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    bottom: -50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.6);
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) translateX(0) scale(1);
      opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 0.8; }
    100% {
      transform: translateY(-110vh) translateX(var(--drift, 40px)) scale(0.3);
      opacity: 0;
    }
  }

  nav {
    position: fixed;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    gap: 0.5rem;
    padding: 0.6rem;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  nav a {
    padding: 0.5rem 1.3rem;
    border-radius: 999px;
    color: rgba(255, 255, 255, 0.7);
    text-decoration: none;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.25s ease, background 0.25s ease;
  }

  nav a:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.1);
  }

  nav a.active {
    color: #fff;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 16px rgba(255, 110, 196, 0.5);
  }

  .card {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 520px;
    width: 100%;
    padding: 3.5rem 3rem;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.4),
      inset 0 1px 1px rgba(255, 255, 255, 0.15);
    animation: floatCard 6s ease-in-out infinite;
  }

  @keyframes floatCard {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 6s linear infinite;
    text-shadow: 0 0 60px rgba(255, 110, 196, 0.35);
  }

  @keyframes shine {
    to { background-position: 300% center; }
  }

  .divider {
    width: 80px;
    height: 3px;
    margin: 1.75rem auto;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 12px var(--accent);
  }

  p.body-text {
    font-size: 1.05rem;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.75);
    font-weight: 300;
    margin-bottom: 1.75rem;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
    text-align: left;
  }

  label {
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 0.4rem;
    display: block;
  }

  input, textarea {
    width: 100%;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.25s ease, background 0.25s ease;
    resize: none;
  }

  input::placeholder, textarea::placeholder {
    color: rgba(255, 255, 255, 0.35);
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.1);
  }

  button {
    margin-top: 0.5rem;
    padding: 0.9rem 1.5rem;
    border: none;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    box-shadow: 0 4px 20px rgba(255, 110, 196, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255, 110, 196, 0.55);
  }

  .status {
    margin-top: 1rem;
    font-size: 0.9rem;
    color: var(--accent-3);
    min-height: 1.2rem;
  }

  .contact-links {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.75rem;
    flex-wrap: wrap;
  }

  .contact-links a {
    color: rgba(255, 255, 255, 0.6);
    text-decoration: none;
    font-size: 0.9rem;
    border-bottom: 1px solid transparent;
    transition: color 0.25s ease, border-color 0.25s ease;
  }

  .contact-links a:hover {
    color: #fff;
    border-color: var(--accent);
  }

  footer {
    margin-top: 2rem;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <nav>
    <a href="hello-world.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>

  <div class="card">
    <h1>💌 Get In Touch</h1>
    <div class="divider"></div>
    <p class="body-text">
      Have a question, an idea, or just want to say hello? Drop a message below.
    </p>

    <form id="contact-form">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Say something nice..." required></textarea>
      </div>
      <button type="submit">Send Message</button>
      <p class="status" id="status"></p>
    </form>

    <div class="contact-links">
      <a href="mailto:hello@example.com">hello@example.com</a>
      <a href="hello-world.html">Back Home</a>
    </div>

    <footer>crafted with HTML &amp; CSS</footer>
  </div>

  <script>
    const container = document.getElementById('particles');
    const count = 30;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.setProperty('--drift', (Math.random() * 160 - 80) + 'px');
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }

    document.getElementById('contact-form').addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('status').textContent = "Thanks! This is a demo form — no message was actually sent.";
      this.reset();
    });
  </script>

</body>
</html>
